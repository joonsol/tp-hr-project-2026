# Local development defaults only, matching docker-compose.yml at the repo root.
# Run: docker compose up -d   (from the repo root) before starting the backend.
spring.datasource.url=jdbc:mysql://localhost:3307/tp_hr?serverTimezone=Asia/Seoul&characterEncoding=UTF-8&useUnicode=true
spring.datasource.username=tp_hr_user
spring.datasource.password=tp_hr_password
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

jwt.secret=local-dev-only-secret-key-change-me-32chars-min

logging.level.com.tphr.hr=DEBUG
