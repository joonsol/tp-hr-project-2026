# Used when the backend itself runs inside docker-compose (service name "backend").
# Talks to MySQL via the compose network hostname, not localhost.
spring.datasource.url=jdbc:mysql://mysql:3306/tp_hr?serverTimezone=Asia/Seoul&characterEncoding=UTF-8&useUnicode=true
spring.datasource.username=tp_hr_user
spring.datasource.password=tp_hr_password
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

jwt.secret=${JWT_SECRET:docker-dev-only-secret-key-change-me-32chars-min}

logging.level.com.tphr.hr=INFO
